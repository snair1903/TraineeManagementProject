services:


  rabbitmq:
    image: docker-registry-002.zeuslearning.com/zeuslearning/rabbitmq:latest
    container_name: rabbitmq
    ports:
      - "5672:5672"   
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    # FIX: Native RabbitMQ health ping
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    configs:
      - source: rabbitmq-plugins
        target: /etc/rabbitmq/enabled_plugins
  redis:
    image: docker-registry-002.zeuslearning.com/zeuslearning/redis:latest
    container_name: redis_server
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} 
    volumes:
      - redis_data:/data
    # FIX: Authenticated Redis ping check
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  database:
    image: docker-registry-002.zeuslearning.com/zeuslearning/mysql:latest
    container_name: mysql_server

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # FIX: Authenticated MySQL admin ping check
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  webapi:
    image: trainee-management-api
    build:
      context: ./TraineeManagement.api
      dockerfile: dockerfile
    ports:
      - "5000:8080"
   
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - "./trainee_management_docs:/app/docs"


  Consumer:
    image: submission-process-worker
    build:
      context: ./Workers/SubmissionProcessor.Worker
      dockerfile: dockerfile
    ports:
      - "5001:8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
    - "./trainee_management_docs:/app/docs"



  DirectoryApi:
    image: training-directory-api
    build:
      context: ./TrainingDirectory.Api
      dockerfile: dockerfile
    ports:
      - "5002:8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on: 
      - webapi
      

configs:
  rabbitmq-plugins:
    content: "[rabbitmq_management]."

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
